name: "Build Go60"
on: workflow_dispatch
jobs:
  build_go60:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["go60_lh","go60_rh"]'
      alphas: '["QWERTY"]'
      nav: '["vi"]'
      branches: '["moergo-sc/zmk/main"]'
  build_dongle:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["raytac_mdbt50q_rx"]'
      shield: '["go60_dongle","settings_reset"]'
      alphas: '["QWERTY"]'
      nav: '["vi"]'
      branches: '["moergo-sc/zmk/main"]'
      modules: '["rschenk/zmk-component-raytac-dongle/v0.3"]'
